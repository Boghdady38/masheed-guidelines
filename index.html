<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل هوية مشيد القابضة - النسخة الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --masheed-black: #111111;
            --masheed-accent: #C8A96E;
            --bg-light: #F5F4F1;
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--white); color: var(--masheed-black); line-height: 1.6; }

        /* Navigation */
        nav { background: var(--masheed-black); padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-logo { height: 35px; filter: brightness(0) invert(1); }

        /* Hero Section */
        .hero { background: var(--masheed-black); color: white; padding: 120px 5%; text-align: center; border-bottom: 6px solid var(--masheed-accent); }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; line-height: 1.2; }
        .hero p { opacity: 0.6; margin-top: 20px; font-size: 1.1rem; max-width: 700px; margin-left: auto; margin-right: auto; }

        /* Section Layout */
        .section { padding: 100px 5%; border-bottom: 1px solid #eee; }
        .section-label { font-family: 'Syne', sans-serif; font-size: 0.75rem; color: var(--masheed-accent); letter-spacing: 3px; display: block; margin-bottom: 10px; }
        .section-header h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 50px; position: relative; display: inline-block; }
        .section-header h2::after { content: ''; position: absolute; bottom: -10px; right: 0; width: 50px; height: 4px; background: var(--masheed-accent); }

        /* 01. Brand Architecture Grid */
        .brand-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .brand-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.4s; }
        .brand-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .brand-logo-box { height: 180px; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fafafa; }
        .brand-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .brand-info { padding: 30px; text-align: center; }
        .brand-info h3 { font-size: 1.3rem; margin-bottom: 10px; color: #1a5bbe; }

        /* 02. Usage Contexts (Patterns) */

        .context-card { background: var(--bg-light); border-radius: 24px; overflow: hidden; }
