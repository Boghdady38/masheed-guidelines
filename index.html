<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل هوية مشيد القابضة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --masheed-black: #111111;
    --masheed-dark: #1A1A1A;
    --masheed-gray: #6B6B6B;
    --masheed-light: #F5F4F1;
    --masheed-white: #FEFEFE;
    --masheed-accent: #C8A96E;
    --brand-pc: #1A5BBE;
    --brand-sp: #1B6B6A;
    --brand-sparx: #E84127;
    --rule: 1px solid rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cairo', sans-serif; background: var(--masheed-white); color: var(--masheed-black); line-height: 1.7; }

  /* COVER */
  .cover { background: var(--masheed-black); color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 5vw; border-bottom: 8px solid var(--masheed-accent); }
  .cover h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; line-height: 1; }
  .cover h1 span { color: var(--masheed-accent); }
  .cover-sub { font-family: 'Syne', sans-serif; font-size: 0.9rem; letter-spacing: 4px; opacity: 0.5; margin-bottom: 2rem; }

  /* SECTION */
  .section { padding: 6rem 5vw; border-bottom: var(--rule); }
  .section-label { font-family: 'Syne', sans-serif; font-size: 0.75rem; color: var(--masheed-accent); letter-spacing: 2px; margin-bottom: 1rem; display: block; }
  .section-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 3rem; }

  /* BRAND GRID */
  .brand-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
  .brand-card { background: #fff; border: 1px solid #eee; border-radius: 20px; overflow: hidden; transition: 0.3s; }
  .brand-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
  .brand-visual { height: 200px; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fff; } /* هنا شيلنا السواد */
  .brand-visual img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .brand-info { padding: 25px; text-align: center; border-top: 1px solid #f9f9f9; }
  .brand-info h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 5px; }

  /* PATTERNS */
  .pattern-box { background: var(--masheed-light); border-radius: 24px; padding: 4rem; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 40px; }
  .divider-v { width: 1px; height: 60px; background: rgba(0,0,0,0.1); }

  /* CLOSING */
  .closing { background: var(--masheed-black); color: white; padding: 6rem 5vw; text-align: center; }
  .closing h2 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="cover">
  <div class="cover-sub">MASHEED HOLDING · 2026</div>
  <h1>دليل<br><span>الهوية</span><br>البصرية</h1>
</div>

<div class="section">
  <span class="section-label">01 / BRAND ARCHITECTURE</span>
  <h2 class="section-title">هيكل العلامات التجارية</h2>
  
  <div class="brand-grid">
    <div class="brand-card">
      <div class="brand-visual"><img src="Projects comm.svg"></div>
      <div class="brand-info"><h3>مجتمع المشاريع</h3></div>
    </div>
    <div class="brand-card">
      <div class="brand-visual"><img src="Ar logo white BG.svg"></div>
      <div class="brand-info"><h3>مشاريع السعودية</h3></div>
    </div>
    <div class="brand-card">
      <div class="brand-visual"><img src="Bisht.svg"></div>
      <div class="brand-info"><h3>بشت</h3></div>
    </div>
    <div class="brand-card">
      <div class="brand-visual"><img src="Asset 13.svg"></div>
      <div class="brand-info"><h3>سباركس</h3></div>
    </div>
  </div>
</div>

<div class="section">
  <span class="section-label">02 / USAGE CONTEXTS</span>
  <h2 class="section-title">قواعد التنسيق (Patterns)</h2>

  <div class="pattern-box">
    <img src="Logo with slogan.svg" style="height: 45px;">
    <div class="divider-v"></div>
    <img src="Ar logo white BG.svg" style="height: 45px;">
  </div>
  <p style="text-align:center; color: #666;">النمط B: الظهور المتوازي بين القابضة والعلامة التابعة.</p>
</div>

<div class="closing">
  <h2>هوية واحدة<br>أربع أصوات</h2>
  <p style="opacity:0.5;">Creative Lead: Mohamed Elboghdady</p>
</div>

</body>
</html>
